server:
  port: ${PORT:8080}

spring:
  application:
    name: library-seat-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/library_seat_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}}
