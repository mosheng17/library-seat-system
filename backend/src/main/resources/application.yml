server:
  port: ${PORT:8080}

spring:
  application:
    name: library-seat-system
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/library_seat_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
