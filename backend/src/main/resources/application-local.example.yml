server:
  port: 8080

spring:
  application:
    name: library-seat-system
  datasource:
    url: jdbc:mysql://localhost:3306/library_seat_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
